apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: python-ci-run

spec:

  pipelineRef:
    name: python-ci-pipeline

  params:

    - name: repo-url

      # CHANGE THIS
      value: https://github.com/Schlenkian05/platform-engineer.git

    - name: revision
      value: main

    - name: image

      # CHANGE THIS
      value: docker.io/devopsfanatic/python-demo:v1

  workspaces:

    - name: shared-workspace

      persistentVolumeClaim:
        claimName: tekton-pvc
