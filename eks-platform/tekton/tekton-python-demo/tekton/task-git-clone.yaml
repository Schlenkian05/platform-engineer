apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
spec:
  params:
    - name: repo-url
      type: string
    - name: revision
      type: string
      default: main

  workspaces:
    - name: output

  steps:
    - name: clone
      image: alpine/git:latest
      script: |
        #!/bin/sh
        set -e

        git clone $(params.repo-url) \
          --branch $(params.revision) \
          /workspace/output/source

        ls -l /workspace/output/source
