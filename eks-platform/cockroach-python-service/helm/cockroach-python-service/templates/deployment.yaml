apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cockroach-python-service.fullname" . }}
  labels:
    app: {{ include "cockroach-python-service.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "cockroach-python-service.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "cockroach-python-service.name" . }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - containerPort: {{ .Values.containerPort }}

          env:
            - name: DB_HOST
              value: "cockroachdb-public"
            - name: DB_PORT
              value: "26257"
            - name: DB_NAME
              value: {{ .Values.db.name | quote }}
            - name: DB_USER
              value: {{ .Values.db.user | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cockroach-python-service.fullname" . }}-db-secret
                  key: password

          volumeMounts:
            - name: app-storage
              mountPath: {{ .Values.persistence.mountPath }}

          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.containerPort }}
            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.containerPort }}
            initialDelaySeconds: 20
            periodSeconds: 10

      volumes:
        - name: app-storage
          persistentVolumeClaim:
            claimName: {{ include "cockroach-python-service.fullname" . }}-pvc
